<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atul 3-Wheeler Sales — Interview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#1c1b17;
    --ink-soft:#5b5849;
    --paper:#faf7f0;
    --paper-raised:#ffffff;
    --line:#ddd6c4;
    --rust:#b5481f;
    --rust-deep:#8a3416;
    --olive:#566b3e;
    --olive-deep:#3c4c2b;
    --mustard:#c98a1f;
    --danger:#a3342b;
    --danger-bg:#f6e8e4;
    --success:#3c6b3f;
    --success-bg:#e9f0e4;
    --radius:10px;
    --shadow:0 1px 2px rgba(28,27,23,0.06), 0 4px 16px rgba(28,27,23,0.05);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    line-height:1.5;
    min-height:100vh;
  }
  .wrap{max-width:720px;margin:0 auto;padding:24px 20px 80px;}
  .brandbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 0 20px;border-bottom:2px solid var(--ink);margin-bottom:28px;
  }
  .brandbar .mark{display:flex;align-items:center;gap:10px;}
  .brandbar .mark .dot{width:10px;height:10px;background:var(--rust);border-radius:2px;transform:rotate(45deg);}
  .brandbar h1{font-size:15px;font-weight:700;letter-spacing:0.02em;margin:0;text-transform:uppercase;}
  .brandbar .tag{font-size:11px;color:var(--ink-soft);letter-spacing:0.06em;text-transform:uppercase;}
  .brandbar .owner-link{font-size:11px;color:var(--ink-soft);text-decoration:none;letter-spacing:0.03em;cursor:pointer;border:none;background:none;font-family:inherit;}
  .brandbar .owner-link:hover{color:var(--rust);}

  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:28px 26px;
    box-shadow:var(--shadow);
  }
  .eyebrow{
    font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--rust-deep);margin:0 0 8px;
  }
  h2{font-size:22px;font-weight:700;margin:0 0 6px;letter-spacing:-0.01em;}
  .sub{color:var(--ink-soft);font-size:14px;margin:0 0 22px;}

  label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.04em;margin:18px 0 6px;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=tel], select, textarea{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:7px;
    font-size:15px;font-family:inherit;background:var(--paper);color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{
    outline:none;border-color:var(--rust);box-shadow:0 0 0 3px rgba(181,72,31,0.12);
  }
  textarea{resize:vertical;min-height:90px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:540px){.row2{grid-template-columns:1fr;}}

  .photo-zone{
    border:1.5px dashed var(--line);border-radius:8px;padding:18px;text-align:center;
    cursor:pointer;background:var(--paper);transition:border-color .15s;
  }
  .photo-zone:hover{border-color:var(--rust);}
  .photo-zone img{max-width:120px;max-height:120px;border-radius:8px;object-fit:cover;}
  .photo-zone .hint{font-size:13px;color:var(--ink-soft);margin-top:6px;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 22px;border-radius:7px;border:none;font-size:15px;font-weight:600;
    cursor:pointer;font-family:inherit;transition:transform .08s, opacity .15s;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--rust);color:#fff;}
  .btn-primary:hover{background:var(--rust-deep);}
  .btn-primary:disabled{opacity:0.45;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--ink);}
  .btn-block{width:100%;margin-top:24px;padding:14px;font-size:16px;}

  .progress-rail{display:flex;gap:5px;margin-bottom:22px;}
  .progress-seg{flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden;}
  .progress-seg.done{background:var(--olive);}
  .progress-seg.active{background:var(--mustard);}

  .qcat{
    display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:0.06em;
    text-transform:uppercase;padding:4px 9px;border-radius:5px;margin-bottom:12px;
  }
  .qcat.logic{background:#e8e3f5;color:#4d3c8a;}
  .qcat.product{background:#e4ede0;color:var(--olive-deep);}
  .qcat.sales{background:#f6e8da;color:var(--rust-deep);}
  .qcat.situational{background:#f5e9d8;color:#8a5a14;}
  .qcat.communication{background:#e3eef2;color:#2c5a6b;}

  .qtext{font-size:18px;font-weight:600;line-height:1.45;margin:0 0 18px;}

  .loading-row{display:flex;align-items:center;gap:10px;color:var(--ink-soft);font-size:14px;padding:18px 0;}
  .spinner{
    width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--rust);
    border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .center-pad{text-align:center;padding:50px 20px;}
  .center-pad .spinner{margin:0 auto 16px;width:24px;height:24px;border-width:3px;}

  .result-banner{
    border-radius:var(--radius);padding:30px 26px;text-align:center;margin-bottom:20px;
  }
  .result-banner.qualify{background:var(--success-bg);border:1px solid #b7d2ad;}
  .result-banner.disqualify{background:var(--danger-bg);border:1px solid #ddb3ac;}
  .result-banner .verdict{font-size:26px;font-weight:700;margin:6px 0;}
  .result-banner.qualify .verdict{color:var(--success);}
  .result-banner.disqualify .verdict{color:var(--danger);}
  .result-banner .score-big{font-size:42px;font-weight:700;margin:4px 0;}

  .footer-note{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:24px;}

  /* Owner dashboard */
  .pin-box{max-width:340px;margin:60px auto;}
  .cand-row{
    display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);
    border-radius:8px;background:var(--paper-raised);margin-bottom:10px;cursor:pointer;
  }
  .cand-row:hover{border-color:var(--rust);}
  .cand-row img.avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--line);flex-shrink:0;}
  .cand-row .avatar-fallback{
    width:44px;height:44px;border-radius:50%;background:var(--olive);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;
  }
  .cand-row .meta{flex:1;min-width:0;}
  .cand-row .meta .name{font-weight:600;font-size:15px;}
  .cand-row .meta .sub{font-size:12.5px;color:var(--ink-soft);margin:0;}
  .pill{font-size:11px;font-weight:700;letter-spacing:0.03em;padding:4px 10px;border-radius:20px;text-transform:uppercase;flex-shrink:0;}
  .pill.qualify{background:var(--success-bg);color:var(--success);}
  .pill.disqualify{background:var(--danger-bg);color:var(--danger);}
  .pill.pending{background:#eee9da;color:var(--ink-soft);}

  .topbar-owner{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .qa-block{border:1px solid var(--line);border-radius:8px;padding:16px 18px;margin-bottom:12px;background:var(--paper-raised);}
  .qa-block .q{font-weight:600;font-size:14.5px;margin:0 0 8px;}
  .qa-block .a{font-size:14px;color:var(--ink-soft);margin:0 0 10px;white-space:pre-wrap;}
  .qa-block .grade-row{display:flex;align-items:center;gap:10px;font-size:13px;border-top:1px solid var(--line);padding-top:10px;}
  .qa-block .grade-score{font-weight:700;}
  .grade-good{color:var(--success);}
  .grade-mid{color:var(--mustard);}
  .grade-low{color:var(--danger);}

  .cat-bars{display:grid;gap:10px;margin:18px 0;}
  .cat-bar-row{display:grid;grid-template-columns:140px 1fr 40px;align-items:center;gap:10px;font-size:13px;}
  .cat-bar-track{height:8px;background:var(--line);border-radius:4px;overflow:hidden;}
  .cat-bar-fill{height:100%;border-radius:4px;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .err-box{background:var(--danger-bg);color:var(--danger);border-radius:8px;padding:12px 14px;font-size:13.5px;margin:14px 0;}

  a.linklike{color:var(--rust);text-decoration:none;cursor:pointer;font-weight:600;font-size:13px;}
  a.linklike:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
/* =========================================================
   ATUL 3-WHEELER SALES — ADAPTIVE INTERVIEW APP
   Single-file SPA. Owner-gated results. Excel export.
========================================================= */

const OWNER_PIN = "73194"; // change this PIN as needed, share only with owner/MD
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwucuRg-2_QVMsxFrBJQQomMU5hTjXGTEePDnxOWhfcmSK32Zdut5toN8m2tzq-LMtZwA/exec";

async function saveCandidateToSheet(candidateRecord) {
  // Apps Script web apps don't return readable CORS responses to fetch(),
  // so we send with no-cors (fire-and-forget) and verify separately by re-reading the sheet.
  await fetch(SHEETS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({
      submittedAt: candidateRecord.submittedAt,
      name: candidateRecord.name,
      phone: candidateRecord.phone,
      role: candidateRecord.role,
      overallScore: candidateRecord.finalResult ? candidateRecord.finalResult.overallScore : "",
      verdict: candidateRecord.finalResult ? candidateRecord.finalResult.verdict : "",
      categoryScores: candidateRecord.finalResult ? candidateRecord.finalResult.categoryScores : {},
      summary: candidateRecord.finalResult ? candidateRecord.finalResult.summary : "",
      qaLog: candidateRecord.qaLog,
      id: candidateRecord.id,
      aiFailureCount: candidateRecord.aiFailureCount
    })
  });
  // Give Apps Script a moment to write the row, then confirm it landed.
  await new Promise(r => setTimeout(r, 1200));
  const res = await fetch(SHEETS_URL + "?_=" + Date.now());
  if (!res.ok) throw new Error("Could not verify save (sheet not reachable).");
  const rows = await res.json();
  const found = rows.some(r => String(r["Name"]) === candidateRecord.name && String(r["Phone"]) === candidateRecord.phone);
  if (!found) throw new Error("Save could not be confirmed in the sheet.");
  return true;
}

function parseQaLog(raw) {
  if (!raw) return [];
  try { return JSON.parse(raw); } catch (e) { return []; }
}

const CATEGORY_META = {
  logic: { label: "Logical reasoning", color: "#4d3c8a" },
  product: { label: "Product knowledge", color: "#3c4c2b" },
  sales: { label: "Sales aptitude", color: "#8a3416" },
  situational: { label: "Situational judgement", color: "#8a5a14" },
  communication: { label: "Communication", color: "#2c5a6b" }
};

const TOTAL_QUESTIONS = 9;
const QUALIFY_THRESHOLD = 65; // percent

let state = {
  screen: "intake", // intake | interview | submitting | done | owner-pin | owner-dashboard | owner-detail
  candidate: { name: "", phone: "", role: "", photo: "" },
  qaLog: [], // {question, category, answer, score, feedback}
  currentQuestion: null,
  loadingNext: false,
  finalResult: null,
  ownerPinInput: "",
  ownerError: "",
  allCandidates: [],
  selectedCandidateId: null,
  submitError: "",
  aiFailureCount: 0 // tracks how many times AI calls failed during this candidate's interview
};

function render() {
  const app = document.getElementById('app');
  app.innerHTML = "";
  app.appendChild(Brandbar());
  if (state.screen === "intake") app.appendChild(IntakeScreen());
  else if (state.screen === "interview") app.appendChild(InterviewScreen());
  else if (state.screen === "submitting") app.appendChild(SubmittingScreen());
  else if (state.screen === "done") app.appendChild(DoneScreen());
  else if (state.screen === "owner-pin") app.appendChild(OwnerPinScreen());
  else if (state.screen === "owner-dashboard") app.appendChild(OwnerDashboard());
  else if (state.screen === "owner-detail") app.appendChild(OwnerDetail());
}

function Brandbar(){
  const bar = document.createElement('div');
  bar.className = "brandbar";
  bar.innerHTML = `
    <div class="mark">
      <div class="dot"></div>
      <div>
        <h1>Atul 3-Wheeler Sales</h1>
        <div class="tag">Candidate screening</div>
      </div>
    </div>
    <button class="owner-link" id="ownerBtn">Owner login</button>
  `;
  bar.querySelector('#ownerBtn').onclick = () => {
    if (state.screen.startsWith('owner')) {
      state.screen = "intake";
    } else {
      state.screen = "owner-pin";
      state.ownerPinInput = "";
      state.ownerError = "";
    }
    render();
  };
  return bar;
}

/* ---------------- INTAKE ---------------- */
function IntakeScreen(){
  const wrap = document.createElement('div');
  const card = document.createElement('div');
  card.className = "card";
  card.innerHTML = `
    <p class="eyebrow">Application</p>
    <h2>Sales team interview</h2>
    <p class="sub">We're hiring for our Atul three-wheeler sales team. Fill in your details to begin a short adaptive interview — questions adjust based on your answers.</p>

    <label>Full name</label>
    <input type="text" id="f_name" placeholder="e.g. Ramesh Kumar" value="${escapeHtml(state.candidate.name)}">

    <label>Phone number</label>
    <input type="tel" id="f_phone" placeholder="10-digit mobile number" value="${escapeHtml(state.candidate.phone)}">

    <label>Applying for</label>
    <select id="f_role">
      <option value="">Select one</option>
      <option value="Fresher" ${state.candidate.role==="Fresher"?"selected":""}>Fresher — Atul 3-Wheeler Sales</option>
      <option value="Experienced" ${state.candidate.role==="Experienced"?"selected":""}>Experienced — Atul 3-Wheeler Sales</option>
    </select>

    <label>Photo</label>
    <div class="photo-zone" id="photoZone">
      ${state.candidate.photo ? `<img src="${state.candidate.photo}">` : `<div class="hint">Tap to take or upload a photo</div>`}
      <input type="file" id="f_photo" accept="image/*" capture="environment" style="display:none;">
    </div>

    <div id="intakeErr"></div>
    <button class="btn btn-primary btn-block" id="startBtn">Start interview</button>
    <p class="footer-note">Your answers will be reviewed confidentially. Results are visible only to the hiring owner.</p>
  `;
  wrap.appendChild(card);

  card.querySelector('#f_name').oninput = e => state.candidate.name = e.target.value;
  card.querySelector('#f_phone').oninput = e => state.candidate.phone = e.target.value.replace(/[^\d+\s-]/g,'');
  card.querySelector('#f_role').onchange = e => state.candidate.role = e.target.value;

  const zone = card.querySelector('#photoZone');
  const fileInput = card.querySelector('#f_photo');
  zone.onclick = () => fileInput.click();
  fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      state.candidate.photo = ev.target.result;
      render();
    };
    reader.readAsDataURL(file);
  };

  card.querySelector('#startBtn').onclick = async () => {
    const errBox = card.querySelector('#intakeErr');
    if (!state.candidate.name.trim() || !state.candidate.phone.trim() || !state.candidate.role) {
      errBox.innerHTML = `<div class="err-box">Please fill in name, phone number, and select a role to continue.</div>`;
      return;
    }
    if (state.candidate.phone.replace(/\D/g,'').length < 10) {
      errBox.innerHTML = `<div class="err-box">Please enter a valid phone number.</div>`;
      return;
    }
    state.candidate.id = 'cand_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    state.candidate.submittedAt = new Date().toISOString();
    state.screen = "interview";
    render();
    await fetchNextQuestion();
  };

  return wrap;
}

/* ---------------- INTERVIEW ---------------- */
function InterviewScreen(){
  const wrap = document.createElement('div');
  const card = document.createElement('div');
  card.className = "card";

  const segHtml = Array.from({length: TOTAL_QUESTIONS}).map((_,i) => {
    let cls = "progress-seg";
    if (i < state.qaLog.length) cls += " done";
    else if (i === state.qaLog.length) cls += " active";
    return `<div class="${cls}"></div>`;
  }).join("");

  if (state.loadingNext || !state.currentQuestion) {
    card.innerHTML = `
      <div class="progress-rail">${segHtml}</div>
      <div class="loading-row"><div class="spinner"></div> Preparing your next question...</div>
    `;
    wrap.appendChild(card);
    return wrap;
  }

  const q = state.currentQuestion;
  const catMeta = CATEGORY_META[q.category] || {label: q.category};
  card.innerHTML = `
    <div class="progress-rail">${segHtml}</div>
    <span class="qcat ${q.category}">${catMeta.label}</span>
    <p class="qtext">${escapeHtml(q.question)}</p>
    <textarea id="answerBox" placeholder="Type your answer here..."></textarea>
    <div id="interviewErr"></div>
    <button class="btn btn-primary btn-block" id="submitAnswerBtn">Submit answer</button>
  `;
  wrap.appendChild(card);

  const box = card.querySelector('#answerBox');
  setTimeout(() => box.focus(), 50);

  card.querySelector('#submitAnswerBtn').onclick = async () => {
    const ans = box.value.trim();
    const errBox = card.querySelector('#interviewErr');
    if (!ans) {
      errBox.innerHTML = `<div class="err-box">Please write an answer before continuing.</div>`;
      return;
    }
    state.loadingNext = true;
    render();
    await gradeAnswerAndAdvance(q, ans);
  };

  return wrap;
}

function SubmittingScreen(){
  const wrap = document.createElement('div');
  const card = document.createElement('div');
  card.className = "card center-pad";
  card.innerHTML = `
    <div class="spinner"></div>
    <p style="margin-top:4px; color:var(--ink-soft);">Finalising your interview...</p>
  `;
  wrap.appendChild(card);
  return wrap;
}

function DoneScreen(){
  const wrap = document.createElement('div');
  const card = document.createElement('div');
  card.className = "card";

  if (state.saveSucceeded) {
    card.innerHTML = `
      <p class="eyebrow">Interview complete</p>
      <h2>Thank you, ${escapeHtml(state.candidate.name.split(' ')[0] || 'candidate')}.</h2>
      <p class="sub">Your interview has been recorded and submitted for review. Our hiring team will reach out to you on <strong>${escapeHtml(state.candidate.phone)}</strong> if you are shortlisted for the next round.</p>
      <p class="footer-note">You may now close this page.</p>
    `;
  } else {
    const backupCode = btoa(unescape(encodeURIComponent(JSON.stringify({
      id: state.candidate.id, name: state.candidate.name, phone: state.candidate.phone,
      role: state.candidate.role, submittedAt: state.candidate.submittedAt,
      qaLog: state.qaLog, finalResult: state.finalResult
    }))));
    card.innerHTML = `
      <p class="eyebrow">Interview finished — saving issue</p>
      <h2>Your answers were not saved automatically</h2>
      <p class="sub">We could not save your result to the hiring team's system just now (${escapeHtml(state.saveErrorDetail || 'connection issue')}). Please do not close this page — instead, take a screenshot of the code below and send it to the person who shared this interview link with you, along with your name and phone number.</p>
      <textarea readonly style="font-family:monospace; font-size:11px; min-height:90px;">${backupCode}</textarea>
      <button class="btn btn-ghost btn-block" id="retrySaveBtn">Try saving again</button>
    `;
    wrap.appendChild(card);
    setTimeout(() => {
      const btn = document.getElementById('retrySaveBtn');
      if (btn) btn.onclick = async () => {
        state.screen = "submitting";
        render();
        await retrySave();
      };
    }, 0);
    return wrap;
  }

  wrap.appendChild(card);
  return wrap;
}

async function retrySave() {
  const candidateRecord = {
    id: state.candidate.id,
    name: state.candidate.name,
    phone: state.candidate.phone,
    role: state.candidate.role,
    photo: state.candidate.photo,
    submittedAt: state.candidate.submittedAt,
    qaLog: state.qaLog,
    finalResult: state.finalResult,
    aiFailureCount: state.aiFailureCount
  };
  try {
    await saveCandidateToSheet(candidateRecord);
    state.saveSucceeded = true;
    state.saveErrorDetail = "";
  } catch (err) {
    state.saveSucceeded = false;
    state.saveErrorDetail = (err && err.message) ? err.message : "Unknown error saving to sheet.";
  }
  state.screen = "done";
  render();
}

/* ---------------- OWNER SCREENS ---------------- */
function OwnerPinScreen(){
  const wrap = document.createElement('div');
  const card = document.createElement('div');
  card.className = "card pin-box";
  card.innerHTML = `
    <p class="eyebrow">Owner access</p>
    <h2>Enter PIN</h2>
    <p class="sub">Results are confidential and visible only to the hiring owner.</p>
    <input type="text" id="pinInput" inputmode="numeric" placeholder="Enter PIN" style="text-align:center; font-size:20px; letter-spacing:0.2em;">
    <div id="pinErr"></div>
    <button class="btn btn-primary btn-block" id="pinSubmit">Unlock</button>
  `;
  wrap.appendChild(card);

  const input = card.querySelector('#pinInput');
  setTimeout(()=>input.focus(),50);
  const tryUnlock = async () => {
    if (input.value === OWNER_PIN) {
      state.screen = "owner-dashboard";
      render();
      await loadAllCandidates();
    } else {
      card.querySelector('#pinErr').innerHTML = `<div class="err-box">Incorrect PIN. Please try again.</div>`;
    }
  };
  card.querySelector('#pinSubmit').onclick = tryUnlock;
  input.onkeydown = (e) => { if (e.key === 'Enter') tryUnlock(); };

  return wrap;
}

function OwnerDashboard(){
  const wrap = document.createElement('div');

  if (state.loadError) {
    const errBanner = document.createElement('div');
    errBanner.className = "err-box";
    errBanner.style.marginBottom = "12px";
    errBanner.textContent = "Could not load results: " + state.loadError + " — tap Refresh to retry.";
    wrap.appendChild(errBanner);
  }

  const top = document.createElement('div');
  top.className = "topbar-owner";
  top.innerHTML = `
    <h2 style="margin:0;">Candidates (${state.allCandidates.length})</h2>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-ghost" id="refreshBtn"><span>Refresh</span></button>
      <button class="btn btn-ghost" id="exportBtn"><span>Export to Excel</span></button>
    </div>
  `;
  wrap.appendChild(top);

  if (state.allCandidates.length === 0) {
    const empty = document.createElement('div');
    empty.className = "card empty-state";
    empty.textContent = "No candidates have completed the interview yet.";
    wrap.appendChild(empty);
  } else {
    const sorted = [...state.allCandidates].sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));
    sorted.forEach(c => {
      const row = document.createElement('div');
      row.className = "cand-row";
      const initials = (c.name || "?").split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
      const verdictClass = c.finalResult ? (c.finalResult.verdict === "Qualify" ? "qualify" : "disqualify") : "pending";
      const verdictText = c.finalResult ? c.finalResult.verdict : "Pending";
      row.innerHTML = `
        ${c.photo ? `<img class="avatar" src="${c.photo}">` : `<div class="avatar-fallback">${initials}</div>`}
        <div class="meta">
          <div class="name">${escapeHtml(c.name)}</div>
          <p class="sub">${escapeHtml(c.role || '')} · ${escapeHtml(c.phone || '')}</p>
        </div>
        <span class="pill ${verdictClass}">${verdictText}</span>
      `;
      row.onclick = () => { state.selectedCandidateId = c.id; state.screen = "owner-detail"; render(); };
      wrap.appendChild(row);
    });
  }

  const importCard = document.createElement('div');
  importCard.className = "card";
  importCard.style.marginTop = "20px";
  importCard.innerHTML = `
    <p class="eyebrow">Recover a missing result</p>
    <p class="sub" style="margin-bottom:10px;">If a candidate told you their result didn't save and sent you a backup code, paste it here.</p>
    <textarea id="importCodeBox" placeholder="Paste backup code here" style="min-height:70px; font-family:monospace; font-size:12px;"></textarea>
    <div id="importErr"></div>
    <button class="btn btn-ghost btn-block" id="importBtn">Recover result</button>
  `;
  wrap.appendChild(importCard);

  setTimeout(() => {
    const btn = document.getElementById('exportBtn');
    if (btn) btn.onclick = exportToExcel;
    const refreshBtn = document.getElementById('refreshBtn');
    if (refreshBtn) refreshBtn.onclick = loadAllCandidates;
    const importBtn = document.getElementById('importBtn');
    if (importBtn) importBtn.onclick = async () => {
      const box = document.getElementById('importCodeBox');
      const errBox = document.getElementById('importErr');
      try {
        const decoded = JSON.parse(decodeURIComponent(escape(atob(box.value.trim()))));
        if (!decoded.id || !decoded.name) throw new Error("Code is missing required fields.");
        await saveCandidateToSheet(decoded);
        await loadAllCandidates();
      } catch (err) {
        errBox.innerHTML = `<div class="err-box">Could not read this code. Please check it was copied in full.</div>`;
      }
    };
  }, 0);

  return wrap;
}

function OwnerDetail(){
  const wrap = document.createElement('div');
  const c = state.allCandidates.find(x => x.id === state.selectedCandidateId);
  if (!c) {
    wrap.innerHTML = `<div class="card empty-state">Candidate not found.</div>`;
    return wrap;
  }

  const back = document.createElement('a');
  back.className = "linklike";
  back.textContent = "← Back to all candidates";
  back.style.display = "inline-block";
  back.style.marginBottom = "16px";
  back.onclick = () => { state.screen = "owner-dashboard"; render(); };
  wrap.appendChild(back);

  const headerCard = document.createElement('div');
  headerCard.className = "card";
  const fr = c.finalResult || {};
  const verdictClass = fr.verdict === "Qualify" ? "qualify" : "disqualify";
  const initials = (c.name||"?").split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();

  headerCard.innerHTML = `
    <div style="display:flex; gap:16px; align-items:center; margin-bottom:18px;">
      ${c.photo ? `<img class="avatar" style="width:64px;height:64px;" src="${c.photo}">` : `<div class="avatar-fallback" style="width:64px;height:64px;font-size:20px;">${initials}</div>`}
      <div>
        <h2 style="margin:0 0 4px;">${escapeHtml(c.name)}</h2>
        <p class="sub" style="margin:0;">${escapeHtml(c.role||'')} · ${escapeHtml(c.phone||'')}</p>
      </div>
    </div>
    ${c.aiFailureCount ? `<div class="err-box">AI had ${c.aiFailureCount} issue(s) generating or grading questions during this interview. Some questions/scores below may be auto-filled fallbacks — please review manually before relying on this verdict.</div>` : ``}
    <div class="result-banner ${verdictClass}">
      <div style="font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft);">Final verdict</div>
      <div class="verdict">${fr.verdict || 'N/A'}</div>
      <div class="score-big">${fr.overallScore != null ? fr.overallScore + '%' : '—'}</div>
      <p style="margin:6px 0 0; color:var(--ink-soft); font-size:14px;">${escapeHtml(fr.summary || '')}</p>
    </div>
    <div class="cat-bars" id="catBars"></div>
  `;
  wrap.appendChild(headerCard);

  const catBars = headerCard.querySelector('#catBars');
  if (fr.categoryScores) {
    Object.entries(fr.categoryScores).forEach(([cat, score]) => {
      const meta = CATEGORY_META[cat] || {label: cat, color: '#888'};
      const row = document.createElement('div');
      row.className = "cat-bar-row";
      row.innerHTML = `
        <div>${meta.label}</div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${score}%; background:${meta.color};"></div></div>
        <div style="text-align:right; font-weight:600;">${score}%</div>
      `;
      catBars.appendChild(row);
    });
  }

  const qaTitle = document.createElement('h3');
  qaTitle.textContent = "Question-by-question review";
  qaTitle.style.margin = "8px 0 12px";
  wrap.appendChild(qaTitle);

  (c.qaLog || []).forEach((qa, idx) => {
    const block = document.createElement('div');
    block.className = "qa-block";
    const meta = CATEGORY_META[qa.category] || {label: qa.category};
    let gradeClass = "grade-mid";
    if (qa.score >= 75) gradeClass = "grade-good";
    else if (qa.score < 50) gradeClass = "grade-low";
    block.innerHTML = `
      <span class="qcat ${qa.category}" style="margin-bottom:8px;">${meta.label}</span>
      <p class="q">${idx+1}. ${escapeHtml(qa.question)}</p>
      <p class="a">${escapeHtml(qa.answer)}</p>
      <div class="grade-row">
        <span class="grade-score ${gradeClass}">${qa.score}/100</span>
        <span style="color:var(--ink-soft);">${escapeHtml(qa.feedback || '')}</span>
      </div>
    `;
    wrap.appendChild(block);
  });

  return wrap;
}

/* ---------------- AI LOGIC ---------------- */

async function callClaude(systemPrompt, userPrompt) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userPrompt }]
    })
  });
  if (!response.ok) {
    throw new Error("AI request failed: " + response.status);
  }
  const data = await response.json();
  const text = data.content.map(b => b.text || "").join("\n");
  return text;
}

function parseJsonLoose(text) {
  let clean = text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
  const firstBrace = clean.indexOf('{');
  const lastBrace = clean.lastIndexOf('}');
  if (firstBrace !== -1 && lastBrace !== -1) {
    clean = clean.slice(firstBrace, lastBrace+1);
  }
  return JSON.parse(clean);
}

function historySummary() {
  return state.qaLog.map((qa,i) =>
    `Q${i+1} [${qa.category}]: ${qa.question}\nAnswer: ${qa.answer}\nScore given: ${qa.score}/100 — ${qa.feedback}`
  ).join("\n\n");
}

async function fetchNextQuestion() {
  state.loadingNext = true;
  render();
  try {
    const qNum = state.qaLog.length + 1;
    const sys = `You are an expert hiring interviewer for an Atul three-wheeler (auto-rickshaw / commercial three-wheeler) dealership's sales team. You are conducting an ADAPTIVE interview: each question should respond to how well the candidate answered previously. Mix these categories across the interview: logic (logical/numerical reasoning relevant to sales targets, commissions, EMI math), product (knowledge of three-wheelers: load capacity, mileage, fuel types - diesel/CNG/electric, financing schemes, target customers like goods transport or passenger autos), sales (objection handling, persuasion, closing, customer relationship), situational (realistic dealership scenarios), communication (clarity, confidence). Candidate is applying as: ${state.candidate.role}. ${state.candidate.role === 'Fresher' ? 'They have no prior sales experience, so focus more on aptitude, attitude, basic product learning ability, and communication rather than deep experience.' : 'They claim sales experience, so probe deeper into real scenarios, past results, and advanced objection handling.'}
This is question ${qNum} of ${TOTAL_QUESTIONS} total questions.
Respond ONLY with strict JSON, no preamble, no markdown fences:
{"question": "the question text", "category": "logic|product|sales|situational|communication"}`;

    const userPrompt = state.qaLog.length === 0
      ? `Generate the opening question (question 1 of ${TOTAL_QUESTIONS}). Keep it approachable — a warm-up that still reveals sales attitude or basic product sense.`
      : `Interview so far:\n\n${historySummary()}\n\nGenerate question ${qNum} of ${TOTAL_QUESTIONS}. Base it on how the candidate has performed: go deeper or harder if they're doing well, simplify or probe a different angle if they're struggling. Don't repeat a category that's already been used more than twice. Make sure all categories (logic, product, sales, situational, communication) get reasonable coverage by the end of ${TOTAL_QUESTIONS} questions.`;

    const raw = await callClaude(sys, userPrompt);
    const parsed = parseJsonLoose(raw);
    state.currentQuestion = { question: parsed.question, category: parsed.category };
  } catch (err) {
    console.error("AI question generation failed, using fallback question:", err);
    state.aiFailureCount++;
    state.currentQuestion = pickFallbackQuestion();
  }
  state.loadingNext = false;
  render();
}

// Used only if the AI call fails. A varied pool, picked round-robin per
// category-not-yet-asked, so a candidate never sees the exact same
// fallback question twice and different candidates don't all get the same one.
const FALLBACK_QUESTION_POOL = {
  logic: [
    "If a three-wheeler EMI is ₹6,000/month for 36 months at a flat down payment of ₹40,000, what is the total amount the customer pays over the loan?",
    "You need to sell 15 units this month and you've sold 6 in the first 18 days. How many do you need per remaining day to hit target?",
    "A customer asks for a 10% discount on a vehicle priced at ₹3,40,000. What is the discounted price, and what would you say to justify holding the price instead?"
  ],
  product: [
    "What is the difference between a diesel and a CNG Atul three-wheeler in terms of running cost and who would you recommend each to?",
    "A goods-transport customer asks about loading capacity. What questions would you ask them before recommending a model?",
    "What financing or EMI options would you offer a customer who has no credit history?"
  ],
  sales: [
    "Tell me about a time you had to convince someone of something they were initially unsure about. What approach did you take?",
    "A customer says a competitor's three-wheeler is cheaper. How do you respond without just matching the price?",
    "How would you build trust with a customer who is visiting the showroom for the first time?"
  ],
  situational: [
    "A customer who already paid a booking amount calls to cancel due to a family emergency. How do you handle the call?",
    "Two customers walk in at the same time and you're the only salesperson available. What do you do?",
    "Your manager asks you to push a model that isn't moving well. How do you approach this with customers honestly?"
  ],
  communication: [
    "Explain in simple terms, as you would to a customer who has never owned a vehicle, why a three-wheeler might be a good investment for them.",
    "How would you explain a loan EMI schedule to a customer who is not comfortable with numbers?",
    "Describe how you would greet and start a conversation with a walk-in customer."
  ]
};
function pickFallbackQuestion() {
  const usedCategories = state.qaLog.map(qa => qa.category);
  const categories = Object.keys(FALLBACK_QUESTION_POOL);
  // prefer a category used the fewest times so far, for spread across the interview
  const counts = categories.map(cat => usedCategories.filter(c => c === cat).length);
  const minCount = Math.min(...counts);
  const candidates = categories.filter((cat, i) => counts[i] === minCount);
  const category = candidates[Math.floor(Math.random() * candidates.length)];
  const pool = FALLBACK_QUESTION_POOL[category];
  const usedTexts = state.qaLog.map(qa => qa.question);
  const unused = pool.filter(q => !usedTexts.includes(q));
  const question = (unused.length > 0 ? unused : pool)[Math.floor(Math.random() * (unused.length > 0 ? unused.length : pool.length))];
  return { question, category };
}

async function gradeAnswerAndAdvance(question, answerText) {
  try {
    const sys = `You are grading one answer from a candidate interviewing for an Atul three-wheeler dealership sales role (${state.candidate.role}). Score the answer 0-100 based on correctness (for factual/logic/product questions) or quality of reasoning and sales instinct (for open-ended questions). Be fair but rigorous — this score affects a hiring decision. Give a short, specific feedback sentence (max 20 words).
Respond ONLY with strict JSON, no preamble, no markdown fences:
{"score": 0-100 integer, "feedback": "short feedback sentence"}`;
    const userPrompt = `Question category: ${question.category}\nQuestion: ${question.question}\nCandidate's answer: ${answerText}`;
    const raw = await callClaude(sys, userPrompt);
    const parsed = parseJsonLoose(raw);
    state.qaLog.push({
      question: question.question,
      category: question.category,
      answer: answerText,
      score: Math.max(0, Math.min(100, Math.round(parsed.score))),
      feedback: parsed.feedback || ""
    });
  } catch (err) {
    console.error("AI grading failed, using neutral placeholder score:", err);
    state.aiFailureCount++;
    state.qaLog.push({
      question: question.question,
      category: question.category,
      answer: answerText,
      score: 50,
      feedback: "Auto-scored due to a grading issue — review this answer manually."
    });
  }

  if (state.qaLog.length >= TOTAL_QUESTIONS) {
    await finalizeInterview();
  } else {
    state.currentQuestion = null;
    await fetchNextQuestion();
  }
}

async function finalizeInterview() {
  state.screen = "submitting";
  render();

  // Compute category scores
  const categoryScores = {};
  const categoryCounts = {};
  state.qaLog.forEach(qa => {
    categoryScores[qa.category] = (categoryScores[qa.category] || 0) + qa.score;
    categoryCounts[qa.category] = (categoryCounts[qa.category] || 0) + 1;
  });
  Object.keys(categoryScores).forEach(cat => {
    categoryScores[cat] = Math.round(categoryScores[cat] / categoryCounts[cat]);
  });

  const overallScore = Math.round(
    state.qaLog.reduce((sum, qa) => sum + qa.score, 0) / state.qaLog.length
  );
  const verdict = overallScore >= QUALIFY_THRESHOLD ? "Qualify" : "Disqualify";

  let summary = "";
  try {
    const sys = `You write a 1-2 sentence confidential hiring summary for an MD reviewing a sales candidate for an Atul three-wheeler dealership. Be direct and specific, mention strengths/weaknesses by category if relevant. No fluff.`;
    const userPrompt = `Candidate: ${state.candidate.name}, applying as ${state.candidate.role}.\nOverall score: ${overallScore}/100.\nCategory scores: ${JSON.stringify(categoryScores)}.\nVerdict: ${verdict}.\nFull Q&A:\n${historySummary()}`;
    summary = await callClaude(sys, userPrompt);
    summary = summary.trim();
  } catch (err) {
    summary = `Overall score ${overallScore}/100 across ${state.qaLog.length} questions.`;
  }

  state.finalResult = { overallScore, categoryScores, verdict, summary };

  const candidateRecord = {
    id: state.candidate.id,
    name: state.candidate.name,
    phone: state.candidate.phone,
    role: state.candidate.role,
    photo: state.candidate.photo,
    submittedAt: state.candidate.submittedAt,
    qaLog: state.qaLog,
    finalResult: state.finalResult,
    aiFailureCount: state.aiFailureCount
  };

  let saveSucceeded = false;
  let saveErrorDetail = "";

  try {
    await saveCandidateToSheet(candidateRecord);
    saveSucceeded = true;
  } catch (err) {
    console.error("Sheet save failed", err);
    saveErrorDetail = (err && err.message) ? err.message : "Unknown error saving to sheet.";
  }

  state.saveSucceeded = saveSucceeded;
  state.saveErrorDetail = saveErrorDetail;

  state.screen = "done";
  render();
}

/* ---------------- OWNER DATA LOADING ---------------- */
async function loadAllCandidates() {
  try {
    const res = await fetch(SHEETS_URL + "?_=" + Date.now());
    if (!res.ok) throw new Error("Sheet not reachable (HTTP " + res.status + ").");
    const rows = await res.json();
    state.allCandidates = rows.map(r => ({
      id: r["Name"] + "_" + r["Phone"] + "_" + r["Submitted at"],
      name: r["Name"],
      phone: r["Phone"],
      role: r["Applying for"],
      submittedAt: r["Submitted at"],
      qaLog: parseQaLog(r["Full Q&A (JSON)"]),
      aiFailureCount: 0,
      finalResult: {
        overallScore: r["Overall score"],
        verdict: r["Verdict"],
        summary: r["Summary"],
        categoryScores: {
          logic: r["Logical reasoning"],
          product: r["Product knowledge"],
          sales: r["Sales aptitude"],
          situational: r["Situational judgement"],
          communication: r["Communication"]
        }
      }
    })).reverse();
    state.loadError = "";
  } catch (err) {
    console.error("Failed to load candidates", err);
    state.allCandidates = [];
    state.loadError = (err && err.message) ? err.message : "Could not load results from the sheet.";
  }
  render();
}

/* ---------------- EXCEL EXPORT ---------------- */
function exportToExcel() {
  const rows = state.allCandidates.map(c => {
    const fr = c.finalResult || {};
    const cat = fr.categoryScores || {};
    const row = {
      "Name": c.name,
      "Phone": c.phone,
      "Applying for": c.role,
      "Submitted at": c.submittedAt ? new Date(c.submittedAt).toLocaleString() : "",
      "Overall score": fr.overallScore != null ? fr.overallScore : "",
      "Verdict": fr.verdict || "",
      "Logical reasoning": cat.logic != null ? cat.logic : "",
      "Product knowledge": cat.product != null ? cat.product : "",
      "Sales aptitude": cat.sales != null ? cat.sales : "",
      "Situational judgement": cat.situational != null ? cat.situational : "",
      "Communication": cat.communication != null ? cat.communication : "",
      "Summary": fr.summary || ""
    };
    (c.qaLog || []).forEach((qa, idx) => {
      row[`Q${idx+1} (${qa.category})`] = qa.question;
      row[`A${idx+1}`] = qa.answer;
      row[`Score${idx+1}`] = qa.score;
    });
    return row;
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Candidates");
  const filename = `Atul_3Wheeler_Sales_Interviews_${new Date().toISOString().slice(0,10)}.xlsx`;
  XLSX.writeFile(wb, filename);
}

/* ---------------- UTIL ---------------- */
function escapeHtml(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

render();
</script>
